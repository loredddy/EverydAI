<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pattern Generator — EverydAI</title>
    <meta name="description"
        content="Procedural aesthetic pattern generator — abstract, minimal, grunge, neon, organic. Driven by math, equations, and shapes." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body data-preset="abstract">

    <!-- Background noise texture overlay -->
    <div class="bg-noise" aria-hidden="true"></div>

    <!-- ── App Shell ── -->
    <div class="app-shell">

        <!-- ── Sidebar ── -->
        <aside class="sidebar" id="sidebar">

            <!-- Sidebar header -->
            <div class="sidebar-header">
                <div class="app-logo">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"
                        aria-hidden="true">
                        <circle cx="14" cy="14" r="13" stroke="url(#pg-grad)" stroke-width="1.5" fill="none" />
                        <path d="M14 2 Q22 8 22 14 Q22 20 14 26 Q6 20 6 14 Q6 8 14 2Z" fill="url(#pg-grad)"
                            opacity="0.15" />
                        <path d="M4 14 Q10 6 14 14 Q18 22 24 14" stroke="url(#pg-grad)" stroke-width="1.3" fill="none"
                            stroke-linecap="round" />
                        <defs>
                            <linearGradient id="pg-grad" x1="0" y1="0" x2="28" y2="28">
                                <stop offset="0%" stop-color="var(--accent-a)" />
                                <stop offset="100%" stop-color="var(--accent-b)" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <span class="app-title">Pattern<span class="accent-text">Gen</span></span>
                </div>
                <button class="sidebar-toggle" id="sidebar-toggle" title="Collapse sidebar" aria-label="Toggle sidebar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
            </div>

            <!-- Style Presets -->
            <div class="control-group">
                <label class="group-label">Style Preset</label>
                <div class="preset-pills" id="preset-pills">
                    <button class="preset-pill active" data-preset="abstract">Abstract</button>
                    <button class="preset-pill" data-preset="minimal">Minimal</button>
                    <button class="preset-pill" data-preset="grunge">Grunge</button>
                    <button class="preset-pill" data-preset="neon">Neon</button>
                    <button class="preset-pill" data-preset="organic">Organic</button>
                </div>
            </div>

            <!-- Pattern Type -->
            <div class="control-group">
                <label class="group-label" for="pattern-type">Pattern Type</label>
                <div class="select-wrap">
                    <select id="pattern-type" class="styled-select">
                        <option value="spirograph">Spirograph</option>
                        <option value="lissajous">Lissajous</option>
                        <option value="rose">Rose Curve</option>
                        <option value="flowfield">Flow Field</option>
                        <option value="truchet">Truchet Tiles</option>
                        <option value="gridnoise">Grid Noise</option>
                        <option value="fractal">Fractal Burst</option>
                        <option value="crosshatch">Crosshatch</option>
                    </select>
                    <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </div>
            </div>

            <!-- Numeric Controls -->
            <div class="control-group">
                <label class="group-label">Parameters</label>

                <div class="slider-row">
                    <span class="slider-label">Freq A</span>
                    <input type="range" id="freq-a" class="styled-range" min="1" max="20" step="0.5" value="3" />
                    <span class="slider-val" id="freq-a-val">3</span>
                </div>

                <div class="slider-row">
                    <span class="slider-label">Freq B</span>
                    <input type="range" id="freq-b" class="styled-range" min="1" max="20" step="0.5" value="2" />
                    <span class="slider-val" id="freq-b-val">2</span>
                </div>

                <div class="slider-row">
                    <span class="slider-label">Amplitude</span>
                    <input type="range" id="amplitude" class="styled-range" min="0.1" max="1" step="0.01" value="0.8" />
                    <span class="slider-val" id="amplitude-val">0.8</span>
                </div>

                <div class="slider-row">
                    <span class="slider-label">Iterations</span>
                    <input type="range" id="iterations" class="styled-range" min="50" max="8000" step="50"
                        value="2000" />
                    <span class="slider-val" id="iterations-val">2000</span>
                </div>

                <div class="slider-row">
                    <span class="slider-label">Density</span>
                    <input type="range" id="density" class="styled-range" min="1" max="100" step="1" value="40" />
                    <span class="slider-val" id="density-val">40</span>
                </div>

                <div class="slider-row">
                    <span class="slider-label">Seed</span>
                    <input type="range" id="seed" class="styled-range" min="0" max="9999" step="1" value="42" />
                    <span class="slider-val" id="seed-val">42</span>
                </div>
            </div>

            <!-- Equation field -->
            <div class="control-group">
                <label class="group-label" for="equation">Custom Equation
                    <span class="group-hint"
                        title="Variables: x, y, t, a, b, i, n. Applied per iteration to modulate the output.">ⓘ</span>
                </label>
                <div class="eq-input-wrap">
                    <input type="text" id="equation" class="eq-input" placeholder="e.g. sin(x*a) + cos(y*b)"
                        spellcheck="false" autocomplete="off" />
                    <span class="eq-status" id="eq-status"></span>
                </div>
                <p class="eq-hint">Variables: <code>x y t a b i n</code> · Uses JS Math</p>
            </div>

            <!-- Shape & Style -->
            <div class="control-group">
                <label class="group-label" for="shape-type">Shape</label>
                <div class="select-wrap">
                    <select id="shape-type" class="styled-select">
                        <option value="line">Line</option>
                        <option value="circle">Circle</option>
                        <option value="polygon">Polygon</option>
                        <option value="arc">Arc</option>
                        <option value="dot">Dot</option>
                    </select>
                    <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </div>
                <!-- Polygon sides — shown only when shape = polygon -->
                <div class="slider-row poly-sides-row" id="poly-sides-row">
                    <span class="slider-label">Sides</span>
                    <input type="range" id="poly-sides" class="styled-range" min="3" max="12" step="1" value="6" />
                    <span class="slider-val" id="poly-sides-val">6</span>
                </div>
            </div>

            <div class="control-group">
                <label class="group-label">Appearance</label>

                <div class="slider-row">
                    <span class="slider-label">Weight</span>
                    <input type="range" id="line-weight" class="styled-range" min="0.2" max="8" step="0.1" value="1" />
                    <span class="slider-val" id="line-weight-val">1</span>
                </div>

                <div class="slider-row">
                    <span class="slider-label">Opacity</span>
                    <input type="range" id="opacity" class="styled-range" min="0.02" max="1" step="0.01" value="0.6" />
                    <span class="slider-val" id="opacity-val">0.6</span>
                </div>
            </div>

            <!-- Color Palette -->
            <div class="control-group">
                <label class="group-label" for="color-palette">Color Palette</label>
                <div class="select-wrap">
                    <select id="color-palette" class="styled-select">
                        <option value="mono">Mono</option>
                        <option value="duotone">Duotone</option>
                        <option value="spectrum" selected>Spectrum</option>
                        <option value="grunge">Grunge</option>
                        <option value="neon">Neon</option>
                        <option value="fire">Fire</option>
                        <option value="ice">Ice</option>
                    </select>
                    <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </div>
            </div>

            <!-- Sidebar footer actions -->
            <div class="sidebar-actions">
                <button class="btn-action btn-generate" id="btn-generate">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10" />
                        <polyline points="23 20 23 14 17 14" />
                        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" />
                    </svg>
                    Generate
                </button>
                <button class="btn-action btn-randomize" id="btn-randomize">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 3 21 3 21 8" />
                        <line x1="4" y1="20" x2="21" y2="3" />
                        <polyline points="21 16 21 21 16 21" />
                        <line x1="15" y1="15" x2="21" y2="21" />
                    </svg>
                    Randomize
                </button>
                <button class="btn-action btn-animate" id="btn-animate">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3" />
                    </svg>
                    Animate
                </button>
                <button class="btn-action btn-export" id="btn-export">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Export PNG
                </button>
            </div>

        </aside>

        <!-- ── Canvas Stage ── -->
        <main class="stage" id="stage">

            <!-- Floating toolbar when sidebar is collapsed -->
            <div class="stage-toolbar" id="stage-toolbar">
                <button class="stage-tb-btn" id="expand-sidebar" title="Open controls"
                    aria-label="Open controls sidebar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
                <span class="stage-tb-label" id="active-pattern-label">Spirograph</span>
                <span class="stage-preset-badge" id="active-preset-badge">Abstract</span>
            </div>

            <canvas id="pattern-canvas" title="Drag to pan · Double-click to reset"></canvas>
            <!-- Pan hint (fades after first drag) -->
            <div class="pan-hint" id="pan-hint" aria-hidden="true">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20" />
                </svg>
                Drag to pan &nbsp;·&nbsp; Double-click to reset
            </div>

            <!-- Render overlay (loading spinner) -->
            <div class="render-overlay" id="render-overlay" aria-hidden="true">
                <div class="render-spinner"></div>
            </div>

            <!-- Error toast -->
            <div class="toast" id="toast" role="status" aria-live="polite"></div>

        </main>

    </div>

    <script src="app.js"></script>
</body>

</html>
