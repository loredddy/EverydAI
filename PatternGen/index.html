<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pattern Generator — EverydAI</title>
    <meta name="description"
        content="Procedural aesthetic pattern generator — abstract, minimal, grunge, neon, organic. Driven by math, equations, and shapes." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body data-preset="abstract">

    <!-- Background noise texture overlay -->
    <div class="bg-noise" aria-hidden="true"></div>

    <!-- ── App Shell ── -->
    <div class="app-shell">

        <!-- ── Sidebar ── -->
        <aside class="sidebar" id="sidebar">

            <!-- Sidebar header -->
            <div class="sidebar-header">
                <div class="app-logo">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"
                        aria-hidden="true">
                        <circle cx="14" cy="14" r="13" stroke="url(#pg-grad)" stroke-width="1.5" fill="none" />
                        <path d="M14 2 Q22 8 22 14 Q22 20 14 26 Q6 20 6 14 Q6 8 14 2Z" fill="url(#pg-grad)"
                            opacity="0.15" />
                        <path d="M4 14 Q10 6 14 14 Q18 22 24 14" stroke="url(#pg-grad)" stroke-width="1.3" fill="none"
                            stroke-linecap="round" />
                        <defs>
                            <linearGradient id="pg-grad" x1="0" y1="0" x2="28" y2="28">
                                <stop offset="0%" stop-color="var(--accent-a)" />
                                <stop offset="100%" stop-color="var(--accent-b)" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <span class="app-title">Pattern<span class="accent-text">Gen</span></span>
                </div>
                <button class="sidebar-toggle" id="sidebar-toggle" title="Collapse sidebar" aria-label="Toggle sidebar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
            </div>

            <!-- Style Presets -->
            <div class="control-group">
                <label class="group-label">Style Preset</label>
                <div class="preset-pills" id="preset-pills">
                    <button class="preset-pill active" data-preset="abstract">Abstract</button>
                    <button class="preset-pill" data-preset="minimal">Minimal</button>
                    <button class="preset-pill" data-preset="neon">Neon</button>
                </div>
            </div>

            <!-- Visualizer Style -->
            <div class="control-group">
                <label class="group-label" for="visualizer-style">Visualizer Style</label>
                <div class="select-wrap">
                    <select id="visualizer-style" class="styled-select">
                        <option value="pulse_ring">Pulse Ring</option>
                        <option value="sonic_wave">Sonic Wave</option>
                        <option value="bass_core">Bass Core</option>
                        <option value="stardust_vortex">Stardust Vortex</option>
                        <option value="quantum_grid">Quantum Grid</option>
                        <option value="neon_threads">Neon Threads</option>
                    </select>
                    <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </div>
            </div>

            <!-- Audio Reactivity Controls -->
            <div class="control-group">
                <label class="group-label">Audio Reactivity</label>

                <div class="slider-row">
                    <span class="slider-label">Sensitivity</span>
                    <input type="range" id="sensitivity" class="styled-range" min="0.1" max="3" step="0.1"
                        value="1.5" />
                    <span class="slider-val" id="sensitivity-val">1.5</span>
                </div>

                <div class="slider-row">
                    <span class="slider-label">Smoothing</span>
                    <input type="range" id="smoothing" class="styled-range" min="0.1" max="0.99" step="0.01"
                        value="0.8" />
                    <span class="slider-val" id="smoothing-val">0.8</span>
                </div>

                <div class="slider-row">
                    <span class="slider-label">Bass Boost</span>
                    <input type="range" id="bass-boost" class="styled-range" min="1" max="5" step="0.1" value="2.0" />
                    <span class="slider-val" id="bass-boost-val">2.0</span>
                </div>
            </div>

            <div class="control-group">
                <label class="group-label">Appearance</label>

                <div class="slider-row">
                    <span class="slider-label">Weight</span>
                    <input type="range" id="line-weight" class="styled-range" min="0.2" max="8" step="0.1" value="1" />
                    <span class="slider-val" id="line-weight-val">1</span>
                </div>

                <div class="slider-row">
                    <span class="slider-label">Opacity</span>
                    <input type="range" id="opacity" class="styled-range" min="0.02" max="1" step="0.01" value="0.6" />
                    <span class="slider-val" id="opacity-val">0.6</span>
                </div>
            </div>

            <!-- Audio & 3D Synthesis -->
            <div class="control-group">
                <label class="group-label">Audio & 3D Synthesis</label>

                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
                    <span class="slider-label" style="color: var(--accent-a); font-weight: 600;">Audio Reactive</span>
                    <label class="switch" style="position: relative; display: inline-block; width: 34px; height: 20px;">
                        <input type="checkbox" id="audio-reactive" style="opacity: 0; width: 0; height: 0;">
                        <span class="slider round"
                            style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px;"></span>
                        <style>
                            .switch input:checked+.slider {
                                background-color: var(--accent-a);
                            }

                            .switch .slider:before {
                                position: absolute;
                                content: "";
                                height: 14px;
                                width: 14px;
                                left: 3px;
                                bottom: 3px;
                                background-color: white;
                                transition: .4s;
                                border-radius: 50%;
                            }

                            .switch input:checked+.slider:before {
                                transform: translateX(14px);
                            }
                        </style>
                    </label>
                </div>

            </div>

            <!-- Color Palette -->
            <div class="control-group">
                <label class="group-label" for="color-palette">Color Palette</label>
                <div class="select-wrap">
                    <select id="color-palette" class="styled-select">
                        <option value="mono">Mono</option>
                        <option value="duotone">Duotone</option>
                        <option value="spectrum" selected>Spectrum</option>
                        <option value="grunge">Grunge</option>
                        <option value="neon">Neon</option>
                        <option value="fire">Fire</option>
                        <option value="ice">Ice</option>
                    </select>
                    <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </div>
            </div>

            <!-- Sidebar footer actions -->
            <div class="sidebar-actions">
                <button class="btn-action btn-generate" id="btn-generate">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10" />
                        <polyline points="23 20 23 14 17 14" />
                        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" />
                    </svg>
                    Generate
                </button>
                <button class="btn-action btn-randomize" id="btn-randomize">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 3 21 3 21 8" />
                        <line x1="4" y1="20" x2="21" y2="3" />
                        <polyline points="21 16 21 21 16 21" />
                        <line x1="15" y1="15" x2="21" y2="21" />
                    </svg>
                    Randomize
                </button>
                <button class="btn-action btn-export" id="btn-export">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Export PNG
                </button>
            </div>

        </aside>

        <!-- ── Canvas Stage ── -->
        <main class="stage" id="stage">

            <!-- Floating toolbar when sidebar is collapsed -->
            <div class="stage-toolbar" id="stage-toolbar">
                <button class="stage-tb-btn" id="expand-sidebar" title="Open controls"
                    aria-label="Open controls sidebar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
                <span class="stage-tb-label" id="active-pattern-label">Spirograph</span>
                <span class="stage-preset-badge" id="active-preset-badge">Abstract</span>
            </div>

            <canvas id="pattern-canvas" title="Drag to rotate 3D · Double-click to reset"></canvas>
            <!-- Pan hint (fades after first drag) -->
            <div class="pan-hint" id="pan-hint" aria-hidden="true">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20" />
                </svg>
                Drag to rotate 3D &nbsp;·&nbsp; Double-click to reset
            </div>

            <!-- Render overlay (loading spinner) -->
            <div class="render-overlay" id="render-overlay" aria-hidden="true">
                <div class="render-spinner"></div>
            </div>

            <!-- Error toast -->
            <div class="toast" id="toast" role="status" aria-live="polite"></div>

        </main>

    </div>

    <script src="app.js"></script>
</body>

</html>
